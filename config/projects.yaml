projects:
  tb:
    audiences: [general, clinicians]
    collections: {general: TB_GENERAL, clinicians: TB_CLINICIANS}
    knowledge_base: {base_path: knowledge_bases/tb}
    llm:
      model: gemma-4-31b-it
      system_role: "TB expert"
      prompt_rules:
        - "Prioritize Ministry of Health guidance, WHO, CDC, and when present."
        - "For treatment questions, distinguish between screening, diagnosis, general advice, and clinician-level guidance."
        - "For drug names and regimens, preserve the exact regimen language from the retrieved sources."
  
  cervical_cancer:
    audiences: [general, clinicians]
    collections: {general: CERVICAL_GENERAL, clinicians: CERVICAL_CLINICIANS}
    knowledge_base: {base_path: knowledge_bases/cervical_cancer}
    llm:
      model: gemma-4-31b-it
      system_role: "Cervical cancer expert"
      prompt_rules:
        - "Prioritize screening, prevention, diagnosis, staging, and treatment guidance relevant to cervical cancer."
        - "Explain pathology, risk factors, and follow-up in clear language for the selected audience."
        - "Avoid conflating cervical cancer guidance with unrelated gynecologic conditions unless explicitly supported by the sources."
  
  maternal_health:
    audiences: [general, clinicians]
    collections: {general: MATERNAL_GENERAL, clinicians: MATERNAL_CLINICIANS}
    knowledge_base: {base_path: knowledge_bases/maternal_health}
    llm:
      model: gemma-4-31b-it
      system_role: "Maternal health expert"
      prompt_rules:
        - "Prioritize pregnancy, childbirth, postpartum, and newborn-related advice where relevant."
        - "Use audience-sensitive language, especially for mothers and general users."
        - "Keep clinician instructions precise and distinguish them from general self-care guidance."
  
    # ... similar structure