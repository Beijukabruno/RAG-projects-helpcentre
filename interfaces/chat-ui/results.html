<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>Emergent AI Helpcentre | Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-view="results">
  <main class="page-shell">
    <div class="page-backdrop page-backdrop-left"></div>
    <div class="page-backdrop page-backdrop-right"></div>

    <main class="helpcentre-shell">
      <header class="topbar">
        <div class="brand-block">
          <img class="brand-logo" src="../../emergentai.png" alt="Emergent AI" />
        </div>

        <div class="topbar-search" aria-label="Global search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="search-input" type="text" placeholder="Search for questions, topics or keywords..." maxlength="1000" />
          <button id="search-btn" type="button">Search</button>
        </div>

        <div class="topbar-actions" aria-label="Top actions">
          <a class="ghost-action" href="index.html"><span aria-hidden="true">◍</span> Landing page</a>
          <button type="button" class="ghost-action"><span aria-hidden="true">◌</span> English</button>
          <button type="button" class="ghost-action"><span aria-hidden="true">◉</span> Contact Support</button>
        </div>
      </header>

      <section class="results-stage">
        <aside class="hero-answer-card">
          <div class="panel-head compact-head">
            <p class="panel-kicker">Here’s what we found for:</p>
            <h2 id="answer-title">How do I reset my password?</h2>
          </div>
          <div id="answer-meta" class="answer-meta">To reset your password on the MDR web platform, follow the steps below:</div>
          <div id="answer-box" class="answer-box"></div>
          <div class="sources-header">Sources</div>
          <div id="sources-list" class="sources-list"></div>
          <div class="feedback-row">
            <div class="feedback-block">
              <span>Was this helpful?</span>
              <button type="button" class="icon-button" data-feedback="helpful" aria-label="Helpful">👍</button>
              <button type="button" class="icon-button" data-feedback="not-helpful" aria-label="Not helpful">👎</button>
            </div>
            <div class="feedback-divider" aria-hidden="true"></div>
            <div class="rating-block">
              <span>Rate this answer</span>
              <div id="rating-slot"></div>
            </div>
          </div>
        </aside>
      </section>

      <section class="content-grid">
        <section class="left-column">
          <section class="card-section">
            <div class="section-heading">
              <h3>Quick guides</h3>
            </div>
            <div class="quick-guides-grid" id="quick-guides"></div>
          </section>

          <section class="card-section">
            <div class="section-heading faq-heading">
              <h3>Frequently Asked Questions</h3>
            </div>
            <div id="faq-list" class="faq-list"></div>
            <div class="faq-footer">
              <button id="faq-view-btn" type="button" class="link-button">View all FAQs <span aria-hidden="true">→</span></button>
            </div>
          </section>
        </section>
      </section>
    </main>
  </main>

  <script src="app.js"></script>
</body>
</html>
