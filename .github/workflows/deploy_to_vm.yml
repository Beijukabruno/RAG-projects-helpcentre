name: Test, Build, Push, and Deploy Helpcentre

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: helpcentre-api
  CONTAINER_NAME: helpcentre-api-smoke-test
  SMOKE_PORT: 8001
  DEPLOY_COMPOSE_FILE: deploy/docker/docker-compose.yml

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest tests

  build-push-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run API container smoke test
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail
          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${SMOKE_PORT}:8000" \
            -e APP_NAME=helpcentre-smoke \
            -e WAIT_FOR_DB=0 \
            -e RUN_PROJECT_SYNC=0 \
            -e BOOTSTRAP_INDEX_ON_START=0 \
            -e RERANKER_ENABLED=false \
            "${DOCKER_IMAGE}"

          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:${SMOKE_PORT}/health" >/dev/null; then
              echo "Helpcentre API smoke test passed."
              docker logs "${CONTAINER_NAME}" --tail 80
              docker rm -f "${CONTAINER_NAME}"
              exit 0
            fi
            echo "Waiting for API health endpoint... ($i)"
            sleep 2
          done

          docker logs "${CONTAINER_NAME}" || true
          docker rm -f "${CONTAINER_NAME}" || true
          exit 1

      - name: Build and push Helpcentre Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy deployment files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "${{ env.DEPLOY_COMPOSE_FILE }}"
          target: "${{ secrets.VM_APP_PATH }}"

      - name: Generate production env on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"
            mkdir -p deploy/docker

            rm -f .env
            cat <<'EOF' > .env
            ${{ secrets.ENV_FILE_CONTENTS }}
            EOF

            sed -i 's/^[[:space:]]*//' .env
            sed -i '/^HELPCENTRE_IMAGE=/d' .env
            echo "HELPCENTRE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> .env
            chmod 600 .env || true

            test -s .env
            grep -q '^HELPCENTRE_API_HOST_PORT=8080$' .env

            echo "Env checksum:"
            sha256sum .env | awk '{print $1}'
            echo "Env keys:"
            cut -d= -f1 .env | sed '/^$/d' | sort
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" config >/dev/null

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_ACCESS_TOKEN }}"
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" pull
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" down --remove-orphans
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" up -d --pull always --force-recreate helpcentre_postgres
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" run --rm --pull always helpcentre_indexer
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" up -d --pull always --force-recreate helpcentre_api
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" ps
