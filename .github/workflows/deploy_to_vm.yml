name: Build, Push, and Deploy Helpcentre

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_indexer:
        description: "Run the knowledge-base chunking/indexing job after deploying the API"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      index_projects:
        description: "Comma-separated projects to index when run_indexer=true"
        required: false
        default: "tb,cervical_cancer"
      force_rechunk:
        description: "Rebuild chunk JSON files before indexing instead of using existing generated files"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      chunking_strategy:
        description: "Chunking strategy to use when chunks are missing or force_rechunk=true"
        required: false
        default: "recursive"
        type: choice
        options:
          - "recursive"
          - "semantic"
      index_batch_size:
        description: "Embedding/indexing batch size"
        required: false
        default: "64"

env:
  IMAGE_NAME: helpcentre-api
  DEPLOY_COMPOSE_FILE: deploy/docker/docker-compose.yml

concurrency:
  group: helpcentre-deploy
  cancel-in-progress: false

jobs:
  build-push-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Helpcentre Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy deployment files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "${{ env.DEPLOY_COMPOSE_FILE }}"
          target: "${{ secrets.VM_APP_PATH }}"

      - name: Generate production env on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"
            mkdir -p deploy/docker

            rm -f .env
            cat <<'EOF' > .env
            ${{ secrets.ENV_FILE_CONTENTS }}
            EOF

            sed -i 's/^[[:space:]]*//' .env
            sed -i '/^HELPCENTRE_IMAGE=/d' .env
            echo "HELPCENTRE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> .env
            chmod 600 .env || true

            test -s .env
            grep -q '^HELPCENTRE_API_HOST_PORT=8080$' .env

            echo "Env checksum:"
            sha256sum .env | awk '{print $1}'
            echo "Env keys:"
            cut -d= -f1 .env | sed '/^$/d' | sort
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" config >/dev/null

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_ACCESS_TOKEN }}"
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" pull helpcentre_api
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" up -d --remove-orphans helpcentre_postgres
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" up -d --force-recreate helpcentre_api
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" ps

      - name: Confirm deployed service status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"

            API_PORT="$(grep -E '^HELPCENTRE_API_HOST_PORT=' .env | tail -n 1 | cut -d= -f2-)"
            API_PORT="${API_PORT:-8080}"

            echo "Waiting for Helpcentre API on host port ${API_PORT} ..."
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null; then
                echo "Helpcentre API healthcheck passed."
                curl -fsS "http://127.0.0.1:${API_PORT}/ready" || true
                echo
                docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" ps
                exit 0
              fi
              echo "Waiting for /health ... ($i)"
              sleep 3
            done

            echo "Helpcentre API did not become healthy."
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" ps || true
            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" logs --tail=120 helpcentre_api || true
            exit 1

      - name: Run knowledge-base indexer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_indexer == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DEPLOY_COMPOSE_FILE
          command_timeout: 180m
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_PATH }}"

            INDEX_PROJECTS="${{ inputs.index_projects }}"
            FORCE_RECHUNK="${{ inputs.force_rechunk == 'true' && '1' || '0' }}"
            CHUNKING_STRATEGY="${{ inputs.chunking_strategy }}"
            BATCH_SIZE="${{ inputs.index_batch_size }}"

            docker compose --env-file .env -f "$DEPLOY_COMPOSE_FILE" run --rm --pull always \
              -e INDEX_PROJECTS="$INDEX_PROJECTS" \
              -e FORCE_RECHUNK="$FORCE_RECHUNK" \
              -e CHUNKING_STRATEGY="$CHUNKING_STRATEGY" \
              -e BATCH_SIZE="$BATCH_SIZE" \
              helpcentre_indexer
